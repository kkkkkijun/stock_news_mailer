name: Daily News Briefing (Email + Site)

on:
  schedule:
    # 오전 7:37 (한국 시간 기준) → UTC 22:37
    - cron: '37 22 * * *'
    # 오후 5:13 (한국 시간 기준) → UTC 08:13
    - cron: '13 8 * * *'
  workflow_dispatch:

# docs/index.html 을 저장소에 커밋해야 하므로 쓰기 권한 필요
permissions:
  contents: write

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          # 사이트 발행 on/off
          PUBLISH_SITE: '1'
          # 사이트가 잘 뜨는 걸 확인한 뒤 '0' 으로 바꾸면 메일 발송이 꺼진다
          SEND_EMAIL: '1'
          SITE_URL: 'https://kkkkkijun.github.io/stock_news_mailer/'
        run: python main.py
      - name: Publish site (commit docs/index.html)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data
          git diff --staged --quiet || git commit -m "site: 브리핑 갱신 [skip ci]"
          git push
