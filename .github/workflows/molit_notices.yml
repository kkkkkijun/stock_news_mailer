name: MOLIT Notices Summary (Email)

# 국토교통부 고시 신규 요약을 기존 뉴스 메일러와 같은 하루 2회 스케줄로 이메일 발송.
# send_email.yml 과 동일 시각(오전 07:37 / 오후 17:13 KST).
# ※ 하루 1회만 원하면 아래 cron 중 하나(예: 오후분 '13 8 * * *')를 삭제하세요.

on:
  schedule:
    - cron: '37 22 * * *'   # 오전 07:37 KST (UTC 22:37)
    - cron: '13 8 * * *'    # 오후 17:13 KST (UTC 08:13)
  workflow_dispatch:

jobs:
  send-molit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Send MOLIT notice summary email
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          # 수신자는 main.py 기본값 사용. 따로 지정하려면 아래 주석을 풀고
          # 저장소 Secret(EMAIL_RECIPIENTS)에 "a@x.com,b@y.com" 형식으로 등록하세요.
          # (비어 있는 채로 넣으면 수신자가 사라지므로, 값이 있을 때만 활성화)
          # EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          # 게시일 기준 최근 N일 이내 고시를 신규로 판별 (전일자+당일 = 1)
          MOLIT_LOOKBACK_DAYS: '1'
        run: python molit_notices.py
